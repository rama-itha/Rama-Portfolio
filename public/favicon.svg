<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#030712"/>
  
  <!-- Blue glow/border ring -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Inner subtle gradient overlay -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="url(#grad)" opacity="0.15"/>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- R — left side -->
  <text x="4" y="23" font-family="'Arial Black', sans-serif" font-weight="900" font-size="17" fill="url(#textGrad)">R</text>

  <!-- Divider slash -->
  <line x1="17" y1="8" x2="15" y2="24" stroke="#2563eb" stroke-width="1.2" opacity="0.6"/>

  <!-- I — right side -->
  <text x="18" y="23" font-family="'Arial Black', sans-serif" font-weight="900" font-size="17" fill="url(#textGrad)">I</text>
</svg>
